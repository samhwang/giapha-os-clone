services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: giapha
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: giapha
    volumes:
      # Option 1: Named volume (default, portable)
      - postgres_data:/var/lib/postgresql/data

      # Option 2: Bind mount (uncomment and customize path)
      # - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U giapha -d giapha']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giapha-network

  db-migrate:
    image: ghcr.io/viet-aus-it/prisma-migrate-service
    volumes:
      - ./prisma:/src/prisma
      - ./prisma.config.ts:/src/prisma.config.ts
    environment:
      # change-me must be the same as POSTGRES_PASSWORD above
      - DATABASE_URL=postgresql://giapha:change-me@postgres:5432/giapha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - giapha-network

  app:
    build: .
    image: ghcr.io/samhwang/giapha-os-clone:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # change-me must be the same as POSTGRES_PASSWORD above
      - DATABASE_URL=postgresql://giapha:change-me@postgres:5432/giapha
      - BETTER_AUTH_SECRET=change-me-to-a-random-secret-at-least-32-chars
      - BETTER_AUTH_URL=http://localhost:3000
      - SITE_NAME=Gia Phả OS
      # Storage: defaults to local filesystem. Set STORAGE_PROVIDER=s3 for S3-compatible storage.
      - STORAGE_PROVIDER=local
      - UPLOAD_DIR=/app/uploads
      # S3-compatible storage (uncomment when STORAGE_PROVIDER=s3)
      # - S3_ENDPOINT=http://seaweedfs:8333
      # - S3_BUCKET=giapha
      # - S3_REGION=us-east-1
      # - S3_ACCESS_KEY_ID=your-access-key
      # - S3_SECRET_ACCESS_KEY=your-secret-key
      # - S3_PUBLIC_URL=http://seaweedfs:8333/giapha
    volumes:
      # Option 1: Named volume (default, portable)
      - uploads_data:/app/uploads

      # Option 2: Bind mount (uncomment and customize path)
      # - ./data/uploads:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000/'').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - giapha-network

  # Uncomment to use SeaweedFS for S3-compatible storage
  # seaweedfs:
  #   image: chrislusf/seaweedfs:latest
  #   command: "server -s3 -dir=/data"
  #   ports:
  #     - "8333:8333"
  #     - "9333:9333"
  #   volumes:
  #    Option 1: Named volume (default, portable)
  #     - seaweedfs_data:/data
  #
  #   Option 2: Bind mount (uncomment and customize path)
  #     - ./data/seaweedfs:/data
  #   restart: unless-stopped
  #   networks:
  #     - giapha-network

volumes:
  postgres_data:
  uploads_data:
  # seaweedfs_data:

networks:
  giapha-network:
    driver: bridge
