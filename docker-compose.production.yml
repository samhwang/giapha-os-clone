services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: giapha
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: giapha
    volumes:
      # Option 1: Named volume (default, portable)
      - postgres_data:/var/lib/postgresql/data

      # Option 2: Bind mount (uncomment and customize path)
      # - "./data/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giapha -d giapha"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giapha-network

  db-migrate:
    image: ghcr.io/viet-aus-it/prisma-migrate-service
    volumes:
      - ./prisma:/src/prisma
      - ./prisma.config.ts:/src/prisma.config.ts
    environment:
      # change-me must be the same as POSTGRES_PASSWORD above
      - DATABASE_URL=postgresql://giapha:change-me@postgres:5432/giapha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - giapha-network

  app:
    build: .
    image: ghcr.io/samhwang/giapha-os-clone:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # change-me must be the same as POSTGRES_PASSWORD above
      - DATABASE_URL=postgresql://giapha:change-me@postgres:5432/giapha
      - UPLOAD_DIR=/app/uploads
      - BETTER_AUTH_SECRET=change-me-to-a-random-secret-at-least-32-chars
      - BETTER_AUTH_URL=http://localhost:3000
    volumes:
      # Option 1: Named volume (default, portable)
      - uploads_data:/app/uploads

      # Option 2: Bind mount (uncomment and customize path)
      # - "./data/uploads:/app/uploads"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - giapha-network

volumes:
  postgres_data:
  uploads_data:

networks:
  giapha-network:
    driver: bridge
