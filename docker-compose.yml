services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: giapha
      POSTGRES_PASSWORD: giapha
      POSTGRES_DB: giapha
    volumes:
      - ./.docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giapha"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
