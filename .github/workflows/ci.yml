name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  non-docker-tasks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ["ci", "typecheck", "test:ui"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
      - run: pnpm run ${{ matrix.task }}

  docker-tasks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ["test:server", "test:integration", "test:e2e"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
      - run: cp .env.sample .env
      - run: pnpm run ${{ matrix.task }}
