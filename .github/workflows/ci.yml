name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  parallel-tasks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ["lint:ci", "typecheck", "test:ui", "test:server", "test:integration"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: cp .env.sample .env
      - run: pnpm run ${{ matrix.task }}

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: giapha
          POSTGRES_DB: giapha
          POSTGRES_USER: giapha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - run: cp .env.sample .env
      - run: npx playwright install
      - run: pnpm run prisma:migrate:dev
      - run: pnpm run prisma:seed
      - run: pnpm run test:e2e
