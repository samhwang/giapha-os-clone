name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  parallel-tasks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ['lint:ci', 'typecheck', 'test:ui', 'test:server', 'test:integration']
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
      - run: cp .env.sample .env
      - run: bun run ${{ matrix.task }}

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: giapha
          POSTGRES_DB: giapha
          POSTGRES_USER: giapha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
      - run: cp .env.sample .env
      - run: bunx playwright install --with-deps
      - run: bun run prisma:migrate:dev
      - run: bun run prisma:seed
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            .playwright/report/
            .playwright/test-results/
          retention-days: 7
